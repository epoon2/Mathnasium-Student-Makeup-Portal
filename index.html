<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; padding: 20px; font-family: sans-serif; }
    .card { max-width: 500px; margin: auto; border-radius: 12px; border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .header { background: #4e73df; color: white; padding: 25px; border-radius: 12px 12px 0 0; text-align: center; }
    .hidden { display: none; }
    .btn-primary { background: #4e73df; border: none; }
  </style>
</head>
<body>

  <div id="loginSection" class="card">
    <div class="header"><h3>Tutoring Portal</h3><p>Schedule a Make-up Session</p></div>
    <div class="card-body p-4">
      <div class="mb-3">
        <label class="form-label fw-bold">Student Full Name</label>
        <input type="text" id="fullName" class="form-control" placeholder="John Doe">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Student Birthday</label>
        <input type="text" id="dob" class="form-control" placeholder="MM/DD/YYYY">
      </div>
      <button onclick="login()" id="loginBtn" class="btn btn-primary w-100 fw-bold">Login</button>
      <div id="loginError" class="text-danger mt-2 small hidden text-center">Student not found. Please check spelling and DOB.</div>
    </div>
  </div>

  <div id="dashSection" class="card hidden">
    <div class="header"><h3>Hello, <span id="displayName"></span>!</h3></div>
    <div class="card-body p-4">
      <div class="alert alert-info text-center">
        <strong>Available Make-ups: <span id="makeupBalance"></span></strong>
      </div>

      <div id="bookingForm">
        <label class="form-label fw-bold">1. Choose Date</label>
        <input type="date" id="reqDate" class="form-control mb-3" onchange="updateTimeSlots()">

        <label class="form-label fw-bold">2. Choose Time Slot</label>
        <select id="reqTime" class="form-select mb-3">
          <option value="">Select a date first...</option>
        </select>

        <button onclick="submitRequest()" id="submitBtn" class="btn btn-success w-100 fw-bold">Book Session</button>
      </div>
      
      <div id="successMsg" class="alert alert-success mt-3 hidden text-center">Request sent! We will contact you soon.</div>
    </div>
  </div>

  <script>
    let currentStudent = null;

    // The Bridge: This calls the getStudentData function in code.gs
    function login() {
      const name = document.getElementById('fullName').value;
      const dob = document.getElementById('dob').value;
      const btn = document.getElementById('loginBtn');
      
      btn.disabled = true;
      btn.innerText = "Verifying...";

      google.script.run
        .withSuccessHandler(data => {
          if (data) {
            currentStudent = data;
            document.getElementById('displayName').innerText = data.name;
            document.getElementById('makeupBalance').innerText = data.makeups;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashSection').classList.remove('hidden');
          } else {
            document.getElementById('loginError').classList.remove('hidden');
            btn.disabled = false;
            btn.innerText = "Login";
          }
        })
        .getStudentData(name, dob);
    }

    function updateTimeSlots() {
      const dateInput = document.getElementById('reqDate').value;
      const timeSelect = document.getElementById('reqTime');
      const date = new Date(dateInput + 'T00:00:00');
      const day = date.getUTCDay(); // 0=Sunday, 1=Monday... 6=Saturday
      
      let options = '<option value="">Select a Time</option>';
      
      if (day === 0) { // SUNDAY
        options += '<option>9:00 AM-10:00 AM</option><option>10:00 AM-11:00 AM</option><option>11:00 AM-12:00 PM</option><option>12:00 PM-1:00 PM</option>';
      } else if (day === 3) { // WEDNESDAY
        options += '<option>2:00 PM-3:00 PM</option><option>3:00 PM-4:00 PM</option><option>4:00 PM-5:00 PM</option><option>5:00 PM-6:00 PM</option><option>6:00 PM-7:00 PM</option>';
      } else if (day === 6) { // SATURDAY
        options += '<option>Check with office for Saturday availability</option>';
      } else { // MON, TUE, THU, FRI
        options += '<option>3:00 PM-4:00 PM</option><option>4:00 PM-5:00 PM</option><option>5:00 PM-6:00 PM</option><option>6:00 PM-7:00 PM</option>';
      }
      
      timeSelect.innerHTML = options;
    }

    function submitRequest() {
      const date = document.getElementById('reqDate').value;
      const time = document.getElementById('reqTime').value;
      if (!date || !time) return alert("Please select both date and time.");

      document.getElementById('submitBtn').disabled = true;

      google.script.run
        .withSuccessHandler(() => {
          document.getElementById('bookingForm').classList.add('hidden');
          document.getElementById('successMsg').classList.remove('hidden');
        })
        .submitMakeupRequest({
          studentName: currentStudent.name,
          date: date,
          time: time
        });
    }
  </script>
</body>
</html>
