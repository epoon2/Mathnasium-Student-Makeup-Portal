<!DOCTYPE html>
<html>
<head>
  <title>Tutoring Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .hidden { display: none; }
    .card { max-width: 450px; margin: 50px auto; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .btn-custom { background-color: #6f42c1; color: white; }
  </style>
</head>
<body>

  <div id="loginCard" class="card p-4 text-center">
    <h3>Tutoring Portal</h3>
    <input type="text" id="name" class="form-control mb-2" placeholder="Student Full Name">
    <input type="text" id="dob" class="form-control mb-3" placeholder="Birthday (MM/DD/YYYY)">
    <button onclick="checkBalance()" id="btn" class="btn btn-custom w-100">Check Balance</button>
    <p id="error" class="text-danger mt-2 hidden">Student not found.</p>
  </div>

  <div id="resultCard" class="card p-4 text-center hidden">
    <h4>Hello, <span id="studentName"></span></h4>
    <div class="alert alert-info">Available Make-ups: <b id="balance">0</b></div>
    
    <a href="YOUR_GOOGLE_FORM_URL_HERE" target="_blank" class="btn btn-success w-100">Request a Make-up Session</a>
    
    <button onclick="location.reload()" class="btn btn-link mt-3">Back</button>
  </div>

  <script>
    const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE";

    function checkBalance() {
      const name = document.getElementById('name').value;
      const dob = document.getElementById('dob').value;
      
      const script = document.createElement('script');
      script.src = `${SCRIPT_URL}?callback=render&name=${encodeURIComponent(name)}&dob=${encodeURIComponent(dob)}`;
      document.body.appendChild(script);
    }

    function render(data) {
      if (!data) {
        document.getElementById('error').classList.remove('hidden');
        return;
      }
      document.getElementById('studentName').innerText = data.name;
      document.getElementById('balance').innerText = data.makeups;
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('resultCard').classList.remove('hidden');
    }
  </script>
</body>
</html>
