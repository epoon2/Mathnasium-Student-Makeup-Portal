<!DOCTYPE html>
<html>
<head>
    <title>Mathnasium Makeup Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #e31837; }
        img { width: 180px; margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 1.5rem; font-size: 1.4rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background-color: #e31837; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #b3122b; }
        #result { margin-top: 25px; padding: 15px; border-radius: 8px; display: none; line-height: 1.5; }
        .success { background-color: #e6f4ea; color: #137333; border: 1px solid #ceead6; }
        .error { background-color: #fce8e6; color: #c5221f; border: 1px solid #fad2cf; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://www.mathnasium.com/themes/custom/mathnasium/logo.svg" alt="Mathnasium Logo">
        <h2>Student Makeup Portal</h2>
        
        <input type="text" id="name" placeholder="Student Full Name">
        <input type="text" id="dob" placeholder="Birthday (M/D/YYYY)">
        
        <button onclick="search()">Check Balance</button>
        
        <div id="result"></div>
    </div>

    <script>
        function search() {
            const name = document.getElementById('name').value;
            const dob = document.getElementById('dob').value;
            const resultDiv = document.getElementById('result');
            
            if(!name || !dob) {
                alert("Please enter both Name and Birthday");
                return;
            }
        
            console.log("Starting search for:", name, dob); // NEW DEBUG LINE
            resultDiv.style.display = "block";
            resultDiv.innerHTML = "Checking records...";
        
            const url = "https://script.google.com/macros/s/AKfycbx5ywYiNuUMiJIj82dB6BzOamDUyDpfJA2hgFJCfD7xDaCKizMujeRyO5dGugxX0CCY8Q/exec"; 
            
            const script = document.createElement('script');
            script.src = `${url}?name=${encodeURIComponent(name)}&dob=${encodeURIComponent(dob)}&callback=onSuccess`;
            
            // NEW ERROR TRACKING
            script.onerror = function() {
                console.error("The Script URL failed to load. Check your Deployment URL!");
                resultDiv.innerHTML = "Connection Error. Check Console.";
            };
        
            document.body.appendChild(script);
        }
        // This function runs when the Google Sheet replies
        function onSuccess(data) {
            const div = document.getElementById('result');
            if (data) {
                div.className = "success";
                div.innerHTML = `<strong>${data.name}</strong><br>Makeup Sessions Available: <strong>${data.makeups}</strong>`;
            } else {
                div.className = "error";
                div.innerHTML = "No record found.<br><small>Check spelling or Birthday format (M/D/YYYY).</small>";
            }
        }
    </script>
</body>
</html>
